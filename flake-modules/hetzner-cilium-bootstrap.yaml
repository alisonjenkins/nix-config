# Cilium bootstrap for the Hetzner cattle control-plane (k3s helm-controller).
# Written to /var/lib/rancher/k3s/server/manifests/ by k3s-server-bootstrap so
# the CNI comes up before Flux. Tuned for cx33 (4c/8g, kernel 6.18, virtio) +
# Hetzner private-net native routing with tunnel fallback for Tailscale workers.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  repo: https://helm.cilium.io/
  chart: cilium
  version: "1.19.5"
  targetNamespace: kube-system
  bootstrap: true
  valuesContent: |-
    # kube-proxy replacement [V4]. Shared API address reachable by ALL nodes:
    # the CP's stable Hetzner private IP (tofu-pinned, survives replace) [T10].
    # k3s binds *:6443; the CP reaches it locally, workers over the private net
    # (B7 brings up enp7s0=10.0.1.10). Cross-cloud workers (future) would need
    # the CP Tailscale name instead.
    kubeProxyReplacement: true
    k8sServiceHost: "10.0.1.10"
    k8sServicePort: "6443"

    # Host firewall [B37]: lets a CiliumClusterwideNetworkPolicy with nodeSelector
    # police the NODE's own (host-netns) traffic, not just pods — defence in depth
    # beyond the hcloud Cloud Firewall. The allow policy is GitOps
    # (network-policies/cp-host-firewall). Validated live in audit mode + Hubble
    # (zero would-be-drops) before enforcing. NB: with no host policy the host is
    # default-ALLOW (fail-open), so enabling this alone never locks the node out.
    hostFirewall:
      enabled: true

    # IPAM delegated to k3s (--cluster-cidr); avoids a second allocator.
    ipam:
      mode: kubernetes

    # VXLAN over the Hetzner private net. Native routing does NOT work here: the
    # private net is gatewayed (peers not on-link) so autoDirectNodeRoutes
    # installs nothing, and directRoutingSkipUnreachable has NO tunnel fallback
    # in native mode (no cilium_vxlan device exists) — cross-node pod traffic
    # silently left via the public default route and was dropped [T17 cutover,
    # 2026-07-02]. Tunnel outer IPs = node private IPs (node-ip=private), so pod
    # traffic rides the Hetzner network. MTU pinned: private NIC 1450 − vxlan 50
    # = 1400 (autodetect would pick eth0's 1500 → blackholed big packets).
    routingMode: tunnel
    tunnelProtocol: vxlan
    MTU: 1400
    autoDirectNodeRoutes: false
    enableIPv4Masquerade: true
    enableIPv4BIGTCP: false   # virtio NIC — BIG TCP needs mlx/ice
    ipv6:
      enabled: false

    endpointRoutes:
      enabled: true

    # Datapath: netkit (perf; kernel 6.18). Cilium does NOT do L7 here — its L7
    # proxy (tproxy) can't reach same-node backends (cilium#29864), broken on a
    # single node. Ingress is Envoy Gateway instead (its own Envoy, normal pod
    # networking) [B19,B21,V4]. So cilium L7/Gateway/Envoy are DISABLED; with no
    # cilium L7, tproxy is unneeded and netkit is fine.
    bpf:
      datapathMode: netkit
      masquerade: true
      hostLegacyRouting: false

    bandwidthManager:
      enabled: true
      bbr: true

    # Cilium L7 OFF — ingress via Envoy Gateway (gatewayClassName eg) [I.gateway].
    # Leaving cilium's Envoy on would also collide with EG's Envoy on host base-id
    # 0 / port 443 [B21].
    gatewayAPI:
      enabled: false
    l7Proxy: false
    loadBalancer:
      l7:
        backend: disabled
    envoy:
      enabled: false

    # Observability — relay yes, UI off (RAM) on a small node.
    hubble:
      enabled: true
      relay:
        enabled: true
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 200m, memory: 128Mi }
      ui:
        enabled: false
      metrics:
        enabled: [drop, tcp, flow, port-distribution, httpV2]

    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    operator:
      replicas: 1
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 500m, memory: 256Mi }

    # NB: this k3s's embedded containerd uses the DEFAULT CNI dirs
    # (/etc/cni/net.d + /opt/cni/bin per `crictl info`), NOT the k3s paths.
    # Leave Cilium's cni paths at default so they match containerd.
