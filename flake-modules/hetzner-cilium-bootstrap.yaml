# Cilium bootstrap for the Hetzner cattle control-plane (k3s helm-controller).
# Written to /var/lib/rancher/k3s/server/manifests/ by k3s-server-bootstrap so
# the CNI comes up before Flux. Tuned for cx33 (4c/8g, kernel 6.18, virtio) +
# Hetzner private-net native routing with tunnel fallback for Tailscale workers.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cilium
  namespace: kube-system
spec:
  repo: https://helm.cilium.io/
  chart: cilium
  version: "1.19.5"
  targetNamespace: kube-system
  bootstrap: true
  valuesContent: |-
    # kube-proxy replacement [V4]. Shared API address reachable by ALL nodes:
    # the CP's stable Hetzner private IP (tofu-pinned, survives replace) [T10].
    # k3s binds *:6443; the CP reaches it locally, workers over the private net
    # (B7 brings up enp7s0=10.0.1.10). Cross-cloud workers (future) would need
    # the CP Tailscale name instead.
    kubeProxyReplacement: true
    k8sServiceHost: "10.0.1.10"
    k8sServicePort: "6443"

    # IPAM delegated to k3s (--cluster-cidr); avoids a second allocator.
    ipam:
      mode: kubernetes

    # Native routing over the Hetzner private net. The private net has a gateway,
    # so plain autoDirectNodeRoutes fails; directRoutingSkipUnreachable routes
    # natively to in-net peers and falls back to tunnel for Tailscale/cross-cloud.
    routingMode: native
    ipv4NativeRoutingCIDR: "10.0.0.0/8"
    autoDirectNodeRoutes: true
    directRoutingSkipUnreachable: true
    enableIPv4Masquerade: true
    enableIPv4BIGTCP: false   # virtio NIC — BIG TCP needs mlx/ice
    ipv6:
      enabled: false

    endpointRoutes:
      enabled: true

    # Datapath: veth + tproxy (NOT netkit). The L7 proxy (Gateway API / Envoy)
    # REQUIRES tproxy to redirect to/from Envoy, and tproxy is INCOMPATIBLE with
    # netkit [Cilium 1.19 docs]. On netkit the Envoy→backend path silently fails
    # ("upstream connect timeout"; cilium#29864) — our Gateway couldn't reach
    # Museum. veth + bpf.tproxy is the documented combo for Gateway/Envoy L7
    # with kube-proxy-replacement + native routing [B19, V4].
    bpf:
      datapathMode: veth
      tproxy: true
      masquerade: true
      hostLegacyRouting: false

    bandwidthManager:
      enabled: true
      bbr: true

    # Gateway API via hostNetwork Envoy (floating-IP ingress) [V13]. Separate
    # Envoy DaemonSet so Karpenter sees its per-node reservation.
    gatewayAPI:
      enabled: true
      hostNetwork:
        enabled: true
    l7Proxy: true
    loadBalancer:
      l7:
        backend: envoy
      mode: hybrid
    envoy:
      enabled: true
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 500m, memory: 512Mi }

    # Observability — relay yes, UI off (RAM) on a small node.
    hubble:
      enabled: true
      relay:
        enabled: true
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 200m, memory: 128Mi }
      ui:
        enabled: false
      metrics:
        enabled: [drop, tcp, flow, port-distribution, httpV2]

    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    operator:
      replicas: 1
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 500m, memory: 256Mi }

    # NB: this k3s's embedded containerd uses the DEFAULT CNI dirs
    # (/etc/cni/net.d + /opt/cni/bin per `crictl info`), NOT the k3s paths.
    # Leave Cilium's cni paths at default so they match containerd.
