name: Update and push flake lock

on:
  schedule:
    - cron: "* 2 * * *"
  workflow_dispatch:
  repository_dispatch:
    event_type: update-flake-lock

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v34
        with:
          # Pin to match local dev nix (2.31.x). The action's v34 default is
          # 2.29.2, which serialises nested `follows` (e.g. ali-neovim's
          # nixvim.inputs.nixpkgs.follows) as a concrete nixpkgs node instead
          # of a follows array. Local nix 2.31.x re-dedups it on every eval,
          # churning flake.lock and blocking `git pull`. Keep in lockstep.
          nix_version: "2.31.2"
      - uses: DeterminateSystems/flake-checker-action@v12
      - name: Setup git
        run: |
          git config --global user.name 'Github Actions'
          git config --global user.email 'alisonjenkins-gha@users.noreply.github.com'
      - name: Update flake
        run: |
          nix flake update --commit-lock-file && \
          git push origin main
