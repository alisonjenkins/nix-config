name: Refresh Builder AMIs

on:
  workflow_run:
    workflows: ["Update and push flake lock"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      arch:
        description: 'Which architecture to refresh'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - x86_64
          - arm64

permissions:
  contents: read
  id-token: write

jobs:
  refresh-x86_64:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.arch != 'arm64') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      AWS_REGION: eu-west-1
      RETENTION_COUNT: 2
    steps:
      - uses: actions/checkout@v6

      - name: Install AWS CLI
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix profile install nixpkgs#awscli2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BUILDER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest x86_64 builder AMI
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=name,Values=nixos-aws-nix-builder-*" \
              "Name=state,Values=available" \
            --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
            --output text)

          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            echo "::error::No x86_64 builder AMI found"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Using base AMI: $AMI_ID"

      - name: Fetch SSH key from SSM
        id: ssh
        run: |
          aws ssm get-parameter \
            --name /nix-builder/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/builder_key
          chmod 600 /tmp/builder_key
          PUBKEY=$(aws ssm get-parameter \
            --name /nix-builder/ssh-public-key \
            --query 'Parameter.Value' \
            --output text)
          echo "pubkey=$PUBKEY" >> "$GITHUB_OUTPUT"

      - name: Launch instance for warming
        id: ec2
        run: |
          cat > /tmp/user-data.sh <<'USERDATA'
          #!/bin/bash
          echo '${{ secrets.NIKS3_TOKEN }}' > /etc/niks3-token
          chmod 600 /etc/niks3-token
          mkdir -p /home/builder/.ssh
          echo '${{ steps.ssh.outputs.pubkey }}' >> /home/builder/.ssh/authorized_keys
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/authorized_keys
          chown -R builder:users /home/builder/.ssh
          USERDATA

          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami_id }}" \
            --instance-type c7a.4xlarge \
            --security-group-ids "${{ secrets.AWS_BUILDER_SG_ID }}" \
            --subnet-id "${{ secrets.AWS_BUILDER_SUBNET_ID }}" \
            --instance-initiated-shutdown-behavior terminate \
            --instance-market-options 'MarketType=spot,SpotOptions={SpotInstanceType=one-time}' \
            --block-device-mappings 'DeviceName=/dev/xvda,Ebs={VolumeSize=200,VolumeType=gp3}' \
            --user-data file:///tmp/user-data.sh \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=nix-builder-x86_64-refresh},{Key=ManagedBy,Value=gha-nix-builder}]" \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Launched instance: $INSTANCE_ID"

          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          BUILDER_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "BUILDER_IP=$BUILDER_IP" >> "$GITHUB_ENV"

      - name: Wait for SSH
        run: |
          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o BatchMode=yes \
                   -i /tmp/builder_key builder@"$BUILDER_IP" true 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH timeout" && exit 1

      - name: Build desktop configs to warm store
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/builder_key builder@"$BUILDER_IP" bash <<'REMOTE'
            set -euo pipefail
            if [ -d ~/nix-config ]; then
              cd ~/nix-config && git fetch origin main && git reset --hard origin/main
            else
              git clone https://github.com/alisonjenkins/nix-config.git ~/nix-config && cd ~/nix-config
            fi

            for cfg in ali-desktop ali-framework-laptop ali-work-laptop; do
              echo "=== Building $cfg ==="
              nix build -L --keep-going --no-link \
                ".#nixosConfigurations.${cfg}.config.system.build.toplevel" 2>&1
            done

            # Garbage collect old paths
            nix-collect-garbage --delete-older-than 7d
          REMOTE

      - name: Stop instance for AMI creation
        run: |
          aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
          echo "Waiting for instance to stop..."
          aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"

      - name: Create refreshed AMI
        id: new-ami
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          AMI_NAME="nixos-aws-nix-builder-${TIMESTAMP}"

          AMI_ID=$(aws ec2 create-image \
            --instance-id "$INSTANCE_ID" \
            --name "$AMI_NAME" \
            --description "NixOS nix builder x86_64 with warm store" \
            --no-reboot \
            --query 'ImageId' \
            --output text)

          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Created AMI: $AMI_ID ($AMI_NAME)"

          # Wait for AMI to be available
          echo "Waiting for AMI to become available..."
          aws ec2 wait image-available --image-ids "$AMI_ID"

          # Tag the AMI
          aws ec2 create-tags --resources "$AMI_ID" --tags \
            "Key=Name,Value=$AMI_NAME" \
            "Key=NixConfig,Value=aws-nix-builder" \
            "Key=ManagedBy,Value=github-actions" \
            "Key=GitCommit,Value=${{ github.sha }}" \
            "Key=BuildTimestamp,Value=$TIMESTAMP"

      - name: Cleanup old builder AMIs
        run: |
          AMIS=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=tag:ManagedBy,Values=github-actions" \
              "Name=tag:NixConfig,Values=aws-nix-builder" \
            --query 'Images | sort_by(@, &CreationDate) | reverse(@) | [*].[ImageId,CreationDate]' \
            --output json)

          TOTAL=$(echo "$AMIS" | jq 'length')
          echo "Found $TOTAL x86_64 builder AMIs"

          if [ "$TOTAL" -gt "$RETENTION_COUNT" ]; then
            TO_DELETE=$(echo "$AMIS" | jq -r ".[$RETENTION_COUNT:][] | .[0]")
            for AMI_ID in $TO_DELETE; do
              echo "Deregistering $AMI_ID..."
              SNAP_IDS=$(aws ec2 describe-images \
                --image-ids "$AMI_ID" \
                --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' \
                --output json | jq -r '.[] // empty')
              aws ec2 deregister-image --image-id "$AMI_ID"
              for SNAP_ID in $SNAP_IDS; do
                echo "  Deleting snapshot $SNAP_ID..."
                aws ec2 delete-snapshot --snapshot-id "$SNAP_ID"
              done
            done
          fi

      - name: Terminate instance
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" || true
          fi
          rm -f /tmp/builder_key /tmp/user-data.sh

  refresh-arm64:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.arch != 'x86_64') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      AWS_REGION: eu-west-1
      RETENTION_COUNT: 2
    steps:
      - uses: actions/checkout@v6

      - name: Install AWS CLI
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix profile install nixpkgs#awscli2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BUILDER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest ARM builder AMI
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=name,Values=nixos-aws-nix-builder-arm-*" \
              "Name=state,Values=available" \
            --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
            --output text)

          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            echo "::error::No ARM builder AMI found"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"

      - name: Fetch SSH key from SSM
        id: ssh
        run: |
          aws ssm get-parameter \
            --name /nix-builder/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/builder_key
          chmod 600 /tmp/builder_key
          PUBKEY=$(aws ssm get-parameter \
            --name /nix-builder/ssh-public-key \
            --query 'Parameter.Value' \
            --output text)
          echo "pubkey=$PUBKEY" >> "$GITHUB_OUTPUT"

      - name: Launch Graviton instance for warming
        id: ec2
        run: |
          cat > /tmp/user-data.sh <<'USERDATA'
          #!/bin/bash
          echo '${{ secrets.NIKS3_TOKEN }}' > /etc/niks3-token
          chmod 600 /etc/niks3-token
          mkdir -p /home/builder/.ssh
          echo '${{ steps.ssh.outputs.pubkey }}' >> /home/builder/.ssh/authorized_keys
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/authorized_keys
          chown -R builder:users /home/builder/.ssh
          USERDATA

          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami_id }}" \
            --instance-type c7g.2xlarge \
            --security-group-ids "${{ secrets.AWS_BUILDER_SG_ID }}" \
            --subnet-id "${{ secrets.AWS_BUILDER_SUBNET_ID }}" \
            --instance-initiated-shutdown-behavior terminate \
            --instance-market-options 'MarketType=spot,SpotOptions={SpotInstanceType=one-time}' \
            --block-device-mappings 'DeviceName=/dev/xvda,Ebs={VolumeSize=200,VolumeType=gp3}' \
            --user-data file:///tmp/user-data.sh \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=nix-builder-arm64-refresh},{Key=ManagedBy,Value=gha-nix-builder}]" \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          BUILDER_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "BUILDER_IP=$BUILDER_IP" >> "$GITHUB_ENV"

      - name: Wait for SSH
        run: |
          for i in $(seq 1 60); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -o BatchMode=yes \
                   -i /tmp/builder_key builder@"$BUILDER_IP" true 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH timeout" && exit 1

      - name: Build arm64 configs to warm store
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/builder_key builder@"$BUILDER_IP" bash <<'REMOTE'
            set -euo pipefail
            if [ -d ~/nix-config ]; then
              cd ~/nix-config && git fetch origin main && git reset --hard origin/main
            else
              git clone https://github.com/alisonjenkins/nix-config.git ~/nix-config && cd ~/nix-config
            fi

            # Build aarch64-linux configs
            for cfg in dev-vm; do
              echo "=== Building $cfg ==="
              nix build -L --keep-going --no-link \
                ".#nixosConfigurations.${cfg}.config.system.build.toplevel" 2>&1
            done

            # Cross-compile darwin
            echo "=== Cross-compiling Alisons-MacBook-Pro ==="
            nix build -L --keep-going --no-link \
              ".#darwinConfigurations.Alisons-MacBook-Pro.system" 2>&1 || \
              echo "::warning::Darwin cross-compile failed"

            nix-collect-garbage --delete-older-than 7d
          REMOTE

      - name: Stop instance for AMI creation
        run: |
          aws ec2 stop-instances --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-stopped --instance-ids "$INSTANCE_ID"

      - name: Create refreshed AMI
        id: new-ami
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          AMI_NAME="nixos-aws-nix-builder-arm-${TIMESTAMP}"

          AMI_ID=$(aws ec2 create-image \
            --instance-id "$INSTANCE_ID" \
            --name "$AMI_NAME" \
            --description "NixOS nix builder arm64 with warm store" \
            --no-reboot \
            --query 'ImageId' \
            --output text)

          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Created AMI: $AMI_ID ($AMI_NAME)"

          aws ec2 wait image-available --image-ids "$AMI_ID"

          aws ec2 create-tags --resources "$AMI_ID" --tags \
            "Key=Name,Value=$AMI_NAME" \
            "Key=NixConfig,Value=aws-nix-builder-arm" \
            "Key=ManagedBy,Value=github-actions" \
            "Key=GitCommit,Value=${{ github.sha }}" \
            "Key=BuildTimestamp,Value=$TIMESTAMP"

      - name: Cleanup old ARM builder AMIs
        run: |
          AMIS=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=tag:ManagedBy,Values=github-actions" \
              "Name=tag:NixConfig,Values=aws-nix-builder-arm" \
            --query 'Images | sort_by(@, &CreationDate) | reverse(@) | [*].[ImageId,CreationDate]' \
            --output json)

          TOTAL=$(echo "$AMIS" | jq 'length')
          if [ "$TOTAL" -gt "$RETENTION_COUNT" ]; then
            TO_DELETE=$(echo "$AMIS" | jq -r ".[$RETENTION_COUNT:][] | .[0]")
            for AMI_ID in $TO_DELETE; do
              SNAP_IDS=$(aws ec2 describe-images \
                --image-ids "$AMI_ID" \
                --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' \
                --output json | jq -r '.[] // empty')
              aws ec2 deregister-image --image-id "$AMI_ID"
              for SNAP_ID in $SNAP_IDS; do
                aws ec2 delete-snapshot --snapshot-id "$SNAP_ID"
              done
            done
          fi

      - name: Terminate instance
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" || true
          fi
          rm -f /tmp/builder_key /tmp/user-data.sh
