name: Build and Cache Nix Flake

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["Update and push flake lock"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        configuration:
          # - .#nixosConfigurations.ali-steam-deck.config.system.build.toplevel
          # - .#nixosConfigurations.dev-vm.config.system.build.toplevel
          - .#nixosConfigurations.ali-desktop.config.system.build.toplevel
          - .#nixosConfigurations.ali-framework-laptop.config.system.build.toplevel
          - .#nixosConfigurations.ali-work-laptop.config.system.build.toplevel
          - .#nixosConfigurations.download-server-1.config.system.build.toplevel
          - .#nixosConfigurations.home-k8s-master-1.config.system.build.toplevel
          - .#nixosConfigurations.home-k8s-server-1.config.system.build.toplevel
          - .#nixosConfigurations.home-kvm-hypervisor-1.config.system.build.toplevel
          - .#nixosConfigurations.home-storage-server-1.config.system.build.toplevel
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            max-jobs = auto
            cores = 0
            eval-cache = true
            extra-substituters = https://cache.nixcache.org https://nix-community.cachix.org https://nix-gaming.cachix.org
            extra-trusted-public-keys = nixcache.org-1:fd7sIL2BDxZa68s/IqZ8kvDsxsjt3SV4mQKdROuPoak= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nix-gaming.cachix.org-1:nbjlureqMbRAxR1gJ/f3hxemL9svXaZF/Ees8vCUUs4=
      - name: Cache Nix evaluation
        uses: actions/cache@v4
        with:
          path: ~/.cache/nix
          key: nix-eval-${{ hashFiles('flake.lock') }}-${{ matrix.configuration }}
          restore-keys: |
            nix-eval-${{ hashFiles('flake.lock') }}-
      - uses: DeterminateSystems/flake-checker-action@main
      - name: Check if build is needed
        id: dry-run
        run: |
          dry_output=$(nix build --dry-run '${{ matrix.configuration }}' 2>&1)
          echo "$dry_output"
          if echo "$dry_output" | grep -q 'will be built:'; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "All derivations are cached — skipping build"
          fi
      - name: Install niks3
        if: steps.dry-run.outputs.needs_build == 'true'
        run: nix profile install github:Mic92/niks3
      - name: Build and push to cache
        if: steps.dry-run.outputs.needs_build == 'true'
        run: |
          nix build --keep-going --print-out-paths --no-link '${{ matrix.configuration }}' | \
            xargs niks3 push \
              --server-url https://api.nixcache.org \
              --max-concurrent-uploads 10 \
              --auth-token "${{ secrets.NIKS3_TOKEN }}"

