name: Build and Cache Nix Flake

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["Update and push flake lock"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lightweight server builds — run on free GHA runners (fully cached, ~2 min each)
  build-servers:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - .#nixosConfigurations.download-server-1.config.system.build.toplevel
          - .#nixosConfigurations.home-k8s-master-1.config.system.build.toplevel
          - .#nixosConfigurations.home-k8s-server-1.config.system.build.toplevel
          - .#nixosConfigurations.home-kvm-hypervisor-1.config.system.build.toplevel
          - .#nixosConfigurations.home-storage-server-1.config.system.build.toplevel
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            max-jobs = auto
            cores = 0
            eval-cache = true
            http-connections = 128
            max-substitution-jobs = 128
            extra-substituters = https://cache.nixcache.org https://nix-community.cachix.org https://nix-gaming.cachix.org https://rust-overlay.cachix.org https://attic.xuyh0120.win/lantian https://cache.garnix.io
            extra-trusted-public-keys = nixcache.org-1:fd7sIL2BDxZa68s/IqZ8kvDsxsjt3SV4mQKdROuPoak= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= nix-gaming.cachix.org-1:nbjlureqMbRAxR1gJ/f3hxemL9svXaZF/Ees8vCUUs4= rust-overlay.cachix.org-1:l2scEhXR2wTljEGAr/OGGykVBVbvHI/phxoBUwxaXkk= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - name: Cache Nix evaluation
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-eval-servers-${{ matrix.configuration }}-${{ github.run_id }}
          restore-keys: |
            nix-eval-servers-${{ matrix.configuration }}-
      - uses: DeterminateSystems/flake-checker-action@v12
      - name: Check if build is needed
        id: dry-run
        run: |
          dry_output=$(nix build --dry-run '${{ matrix.configuration }}' 2>&1)
          echo "$dry_output"
          if echo "$dry_output" | grep -q 'will be built:'; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "All derivations are cached — skipping build"
          fi
      - name: Install niks3
        if: steps.dry-run.outputs.needs_build == 'true'
        run: |
          curl -fsSL https://github.com/Mic92/niks3/releases/download/v1.4.0/niks3_Linux_x86_64.tar.gz | sudo tar xz -C /usr/local/bin niks3
          sudo chmod +x /usr/local/bin/niks3
      - name: Build and push to cache in parallel
        if: steps.dry-run.outputs.needs_build == 'true'
        env:
          NIKS3_TOKEN: ${{ secrets.NIKS3_TOKEN }}
        run: |
          QUEUE=/tmp/niks3-queue
          touch "$QUEUE"

          # Background drainer: watches queue and pushes paths as they appear
          (
            BATCH=0
            while true; do
              if [ -s "$QUEUE" ] && mv "$QUEUE" /tmp/niks3-processing 2>/dev/null; then
                touch "$QUEUE"
                PATHS=$(wc -l < /tmp/niks3-processing)
                BATCH=$((BATCH + 1))
                echo "[drainer] Batch $BATCH: pushing $PATHS path(s) to cache..."
                if cat /tmp/niks3-processing | xargs -r niks3 push \
                  --server-url https://api.nixcache.org \
                  --max-concurrent-uploads 10 \
                  --auth-token "$NIKS3_TOKEN" 2>&1; then
                  echo "[drainer] Batch $BATCH: done"
                else
                  echo "::warning::[drainer] Batch $BATCH: push failed with exit code $?"
                fi
                rm -f /tmp/niks3-processing
              fi
              sleep 2
            done
          ) &
          DRAINER_PID=$!

          # Build, appending output paths to queue
          set +e
          nix build -L --keep-going --print-out-paths --no-link '${{ matrix.configuration }}' \
            2> >(tee /tmp/nix-build-stderr.log | grep --line-buffered -iE '(^[^ ]*> (building|configuring|installing|compiling|linking|cmake|make\[)|building .*/nix/store|copying path|fetching)' >&2) >> "$QUEUE"
          BUILD_EXIT=$?
          set -e

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Build failed with exit code $BUILD_EXIT"
            echo "--- Full build stderr (last 100 lines) ---"
            tail -100 /tmp/nix-build-stderr.log
          fi

          # Stop drainer and do final push of any remaining paths
          kill $DRAINER_PID 2>/dev/null || true
          wait $DRAINER_PID 2>/dev/null || true

          # Merge any leftover queue + in-progress paths for final push
          cat "$QUEUE" /tmp/niks3-processing 2>/dev/null | sort -u > /tmp/niks3-final || true
          if [ -s /tmp/niks3-final ]; then
            FINAL_PATHS=$(wc -l < /tmp/niks3-final)
            echo "[final push] Pushing $FINAL_PATHS remaining path(s) to cache..."
            if cat /tmp/niks3-final | xargs -r niks3 push \
              --server-url https://api.nixcache.org \
              --max-concurrent-uploads 10 \
              --auth-token "$NIKS3_TOKEN" 2>&1; then
              echo "[final push] Done"
            else
              echo "::error::[final push] Failed with exit code $?"
            fi
          else
            echo "[final push] No remaining paths to push"
          fi

          exit $BUILD_EXIT

  # Heavy x86_64 desktop/laptop builds — run on EC2 spot instances
  build-desktops:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: eu-west-1
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            eval-cache = true
            extra-substituters = https://cache.nixcache.org
            extra-trusted-public-keys = nixcache.org-1:fd7sIL2BDxZa68s/IqZ8kvDsxsjt3SV4mQKdROuPoak=

      - name: Cache Nix evaluation
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-eval-desktops-${{ github.run_id }}
          restore-keys: |
            nix-eval-desktops-

      - name: Check if any desktop build is needed
        id: dry-run
        run: |
          needs_build=false
          for cfg in ali-desktop ali-framework-laptop ali-work-laptop; do
            dry_output=$(nix build --dry-run ".#nixosConfigurations.${cfg}.config.system.build.toplevel" 2>&1)
            if echo "$dry_output" | grep -q 'will be built:'; then
              needs_build=true
              echo "$cfg needs building"
            else
              echo "$cfg is fully cached"
            fi
          done
          echo "needs_build=$needs_build" >> "$GITHUB_OUTPUT"

      - name: Install AWS CLI
        if: steps.dry-run.outputs.needs_build == 'true'
        run: nix profile install nixpkgs#awscli2

      - name: Configure AWS credentials
        if: steps.dry-run.outputs.needs_build == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BUILDER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest builder AMI
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=name,Values=nixos-aws-nix-builder-*" \
              "Name=architecture,Values=x86_64" \
              "Name=state,Values=available" \
            --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
            --output text)

          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            echo "::error::No x86_64 builder AMI found. Run the AMI build workflow first."
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Using builder AMI: $AMI_ID"

      - name: Fetch SSH key from SSM
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ssh
        run: |
          aws ssm get-parameter \
            --name /nix-builder/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/builder_key
          chmod 600 /tmp/builder_key
          PUBKEY=$(aws ssm get-parameter \
            --name /nix-builder/ssh-public-key \
            --query 'Parameter.Value' \
            --output text)
          echo "pubkey=$PUBKEY" >> "$GITHUB_OUTPUT"

      - name: Launch EC2 spot instance
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ec2
        run: |
          # User-data: grow partition, inject niks3 token and SSH public key
          cat > /tmp/user-data.sh <<'USERDATA'
          #!/bin/sh
          # Grow root filesystem to fill the EBS volume.
          # Detect root partition dynamically via findmnt/lsblk.
          ROOT_PART=$(findmnt -no SOURCE /)
          if [ -n "$ROOT_PART" ]; then
            PARTNAME=$(basename "$ROOT_PART")
            DISK="/dev/$(lsblk -no PKNAME "$ROOT_PART" | head -1)"
            PARTNUM=$(cat "/sys/class/block/${PARTNAME}/partition" 2>/dev/null || echo "")
            if [ -n "$PARTNUM" ] && [ -b "$DISK" ]; then
              growpart "$DISK" "$PARTNUM" 2>/dev/null || true
              # Force kernel to re-read partition size from on-disk table
              echo 1 > "/sys/class/block/${PARTNAME}/resize" 2>/dev/null || partx -u "$DISK" 2>/dev/null || true
              resize2fs "$ROOT_PART" 2>&1 || xfs_growfs / 2>&1 || true
            fi
          fi
          echo '${{ secrets.NIKS3_TOKEN }}' > /etc/niks3-token
          chown builder:users /etc/niks3-token
          chmod 600 /etc/niks3-token
          mkdir -p /home/builder/.ssh
          echo '${{ steps.ssh.outputs.pubkey }}' >> /home/builder/.ssh/authorized_keys
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/authorized_keys
          chown -R builder:users /home/builder/.ssh
          USERDATA

          USER_DATA_B64=$(base64 -w0 /tmp/user-data.sh)
          IFS=',' read -ra SUBNETS <<< "${{ secrets.AWS_BUILDER_SUBNET_IDS }}"

          # Create a new launch template version with user-data and AMI ID
          # AMI must be in the launch template (not overrides) so the launch
          # template's block device mappings (200GB) take precedence over the
          # AMI's default (auto-sized ~5GB).
          LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "${{ secrets.AWS_BUILDER_LT_X86_ID }}" \
            --source-version '$Default' \
            --launch-template-data "{\"UserData\": \"$USER_DATA_B64\", \"ImageId\": \"${{ steps.ami.outputs.ami_id }}\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)
          echo "Created launch template version: $LT_VERSION"

          # Build overrides: each instance type × each subnet
          OVERRIDES="[]"
          # m-types (64GB) and r-types (128GB) first for memory-heavy builds (kernel LTO, rocblas)
          # Wide instance diversity reduces spot interruption risk
          for itype in m7a.4xlarge m7i.4xlarge m6a.4xlarge m6i.4xlarge r7a.4xlarge r7i.4xlarge c7a.4xlarge c7i.4xlarge c6a.4xlarge c6i.4xlarge; do
            for subnet in "${SUBNETS[@]}"; do
              OVERRIDES=$(echo "$OVERRIDES" | jq -c --arg it "$itype" --arg sn "$subnet" \
                '. + [{"InstanceType": $it, "SubnetId": $sn}]')
            done
          done

          # Write fleet config to file for clean CLI invocation
          jq -n \
            --arg lt "${{ secrets.AWS_BUILDER_LT_X86_ID }}" \
            --arg ltv "$LT_VERSION" \
            --arg sha "${{ github.sha }}" \
            --argjson overrides "$OVERRIDES" \
            '{
              Type: "instant",
              TargetCapacitySpecification: {TotalTargetCapacity: 1, DefaultTargetCapacityType: "spot"},
              SpotOptions: {AllocationStrategy: "price-capacity-optimized", InstanceInterruptionBehavior: "terminate"},
              LaunchTemplateConfigs: [{
                LaunchTemplateSpecification: {LaunchTemplateId: $lt, Version: $ltv},
                Overrides: $overrides
              }],
              TagSpecifications: [{
                ResourceType: "fleet",
                Tags: [{Key: "ManagedBy", Value: "gha-nix-builder"}, {Key: "GitCommit", Value: $sha}]
              }]
            }' > /tmp/fleet-config.json

          echo "Launching x86_64 spot instance with price-capacity-optimized fleet..."
          FLEET_RESULT=$(aws ec2 create-fleet --cli-input-json file:///tmp/fleet-config.json --output json)
          echo "$FLEET_RESULT" | jq .

          INSTANCE_ID=$(echo "$FLEET_RESULT" | jq -r '.Instances[0].InstanceIds[0]')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "Fleet errors:"
            echo "$FLEET_RESULT" | jq '.Errors'
            echo "::error::Fleet failed to launch any instance"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Launched instance: $INSTANCE_ID"

          echo "Waiting for instance to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          BUILDER_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "builder_ip=$BUILDER_IP" >> "$GITHUB_OUTPUT"
          echo "BUILDER_IP=$BUILDER_IP" >> "$GITHUB_ENV"
          echo "Instance IP: $BUILDER_IP"

      - name: Wait for SSH
        if: steps.dry-run.outputs.needs_build == 'true'
        env:
          SSH_OPTS: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes
        run: |
          echo "Waiting for SSH to become available on $BUILDER_IP..."
          for i in $(seq 1 60); do
            echo "Attempt $i: trying SSH to builder@$BUILDER_IP..."
            ssh $SSH_OPTS -o ConnectTimeout=5 -o BatchMode=yes \
                -v -i /tmp/builder_key builder@"$BUILDER_IP" true 2>&1 | tail -5 || true
            if ssh $SSH_OPTS -o ConnectTimeout=5 -o BatchMode=yes \
                   -i /tmp/builder_key builder@"$BUILDER_IP" true 2>/dev/null; then
              echo "SSH ready after ~$((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH timeout after 5 minutes"
          echo "Final diagnostic:"
          ssh $SSH_OPTS -o ConnectTimeout=10 -vvv \
              -i /tmp/builder_key builder@"$BUILDER_IP" true 2>&1 | tail -30 || true
          nc -zv "$BUILDER_IP" 22 2>&1 || echo "Port 22 not reachable"
          exit 1

      - name: Build desktop configs on EC2
        id: desktop-build
        if: steps.dry-run.outputs.needs_build == 'true'
        env:
          SSH_OPTS: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes
        run: |
          # Verify disk was grown and show diagnostics
          ssh $SSH_OPTS -i /tmp/builder_key builder@"$BUILDER_IP" bash <<'DIAG'
            echo "=== Disk layout ==="
            lsblk
            echo "=== Filesystem usage ==="
            df -h /
            echo "=== Partition table ==="
            sudo fdisk -l /dev/xvda 2>/dev/null || sudo fdisk -l /dev/nvme0n1 2>/dev/null || true
            ROOT_FREE=$(df / --output=avail -B1G | tail -1 | tr -d ' ')
            if [ "$ROOT_FREE" -lt 50 ]; then
              echo "::error::Root filesystem has only ${ROOT_FREE}G free — growpart may have failed"
              ROOT_PART=$(findmnt -no SOURCE /)
              PARTNAME=$(basename "$ROOT_PART")
              DISK="/dev/$(lsblk -no PKNAME "$ROOT_PART" | head -1)"
              PARTNUM=$(cat "/sys/class/block/${PARTNAME}/partition" 2>/dev/null || echo "")
              echo "=== Detected root: $ROOT_PART (disk=$DISK partnum=$PARTNUM) ==="
              sudo blkid "$ROOT_PART" || true
              echo "=== systemd-growfs status ==="
              sudo systemctl status systemd-growfs-root.service 2>&1 || true
              echo "=== cloud-init growpart log ==="
              sudo grep -i 'growpart\|resizefs\|resize2fs\|growfs' /var/log/cloud-init.log 2>/dev/null | tail -20 || true
              echo "=== Attempting manual resize ==="
              sudo growpart "$DISK" "$PARTNUM" || echo "growpart: partition already full size"
              echo "--- forcing kernel partition re-read ---"
              echo 1 | sudo tee "/sys/class/block/${PARTNAME}/resize" 2>/dev/null || \
                sudo partx -u "$DISK" 2>/dev/null || true
              echo "--- kernel partition size after re-read ---"
              lsblk "$ROOT_PART"
              echo "--- resize2fs attempt ---"
              sudo resize2fs "$ROOT_PART" || echo "resize2fs failed"
              df -h /
              ROOT_FREE=$(df / --output=avail -B1G | tail -1 | tr -d ' ')
              if [ "$ROOT_FREE" -lt 50 ]; then
                echo "::error::Disk still too small after manual growpart (${ROOT_FREE}G free)"
                exit 1
              fi
            fi
            echo "Disk OK: ${ROOT_FREE}G free"
          DIAG

          # Upload and start build in detached session so it survives SSH drops
          ssh $SSH_OPTS -i /tmp/builder_key builder@"$BUILDER_IP" bash <<'SETUP'
            cat > /tmp/build-desktops.sh <<'SCRIPT'
            #!/bin/bash
            set -uo pipefail

            # Add swap to prevent OOM killing sshd during heavy builds
            if [ ! -f /var/tmp/swapfile ]; then
              sudo fallocate -l 16G /var/tmp/swapfile
              sudo chmod 600 /var/tmp/swapfile
              sudo mkswap /var/tmp/swapfile
              sudo swapon /var/tmp/swapfile
              echo "Swap enabled: $(swapon --show)"
            fi

            NIKS3_TOKEN=$(cat /etc/niks3-token)
            QUEUE=/tmp/niks3-queue
            touch "$QUEUE"

            # Background drainer: watches queue and pushes paths as they appear
            (
              BATCH=0
              while true; do
                if [ -s "$QUEUE" ] && mv "$QUEUE" /tmp/niks3-processing 2>/dev/null; then
                  touch "$QUEUE"
                  PATHS=$(wc -l < /tmp/niks3-processing)
                  BATCH=$((BATCH + 1))
                  echo "[drainer] Batch $BATCH: pushing $PATHS path(s) to cache..."
                  if cat /tmp/niks3-processing | xargs -r niks3 push \
                    --server-url https://api.nixcache.org \
                    --max-concurrent-uploads 10 \
                    --auth-token "$NIKS3_TOKEN" 2>&1; then
                    echo "[drainer] Batch $BATCH: done"
                  else
                    echo "[drainer] Batch $BATCH: push failed (exit $?), will retry remaining paths later"
                  fi
                  rm -f /tmp/niks3-processing
                fi
                sleep 5
              done
            ) &
            DRAINER_PID=$!
            echo "$DRAINER_PID" > /tmp/drainer.pid

            sudo mkdir -p /var/tmp/nix-build
            sudo chown builder:users /var/tmp/nix-build
            export TMPDIR=/var/tmp/nix-build

            if [ -d ~/nix-config ]; then
              cd ~/nix-config
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/alisonjenkins/nix-config.git ~/nix-config
              cd ~/nix-config
            fi
            # git lfs pull || true # disabled: LFS budget exceeded, wallpapers relocated

            any_failed=false
            for cfg in ali-desktop ali-framework-laptop ali-work-laptop; do
              echo "=== Building $cfg ==="
              if nix build -L --keep-going --print-out-paths --no-link \
                ".#nixosConfigurations.${cfg}.config.system.build.toplevel" \
                2> >(tee -a /tmp/nix-build-stderr.log >&2) >> "$QUEUE"; then
                echo "=== $cfg complete ==="
              else
                echo "::warning::$cfg build failed"
                any_failed=true
              fi
            done

            # Stop drainer and do final push of any remaining paths
            kill $DRAINER_PID 2>/dev/null || true
            wait $DRAINER_PID 2>/dev/null || true

            cat "$QUEUE" /tmp/niks3-processing 2>/dev/null | sort -u > /tmp/niks3-final || true
            if [ -s /tmp/niks3-final ]; then
              FINAL_PATHS=$(wc -l < /tmp/niks3-final)
              echo "[final push] Pushing $FINAL_PATHS remaining path(s) to cache..."
              cat /tmp/niks3-final | xargs -r niks3 push \
                --server-url https://api.nixcache.org \
                --max-concurrent-uploads 10 \
                --auth-token "$NIKS3_TOKEN" 2>&1 || echo "[final push] Failed (exit $?)"
              echo "[final push] Done"
            else
              echo "[final push] No remaining paths to push"
            fi

            if [ "$any_failed" = true ]; then
              echo 1 > /tmp/build-exit
            else
              echo 0 > /tmp/build-exit
            fi
          SCRIPT
            chmod +x /tmp/build-desktops.sh
            nohup /tmp/build-desktops.sh > /tmp/build.log 2>&1 &
            echo $! > /tmp/build.pid
            echo "Build started with PID $(cat /tmp/build.pid)"
          SETUP

          # Poll for completion — survives temporary SSH drops
          echo "Build running in background on $BUILDER_IP, polling for completion..."
          CONSECUTIVE_FAILURES=0
          while true; do
            sleep 30
            # Check if process is still running
            if ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
              "kill -0 \$(cat /tmp/build.pid) 2>/dev/null" 2>/dev/null; then
              CONSECUTIVE_FAILURES=0
              # Show recent build output
              ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
                "tail -5 /tmp/build.log" 2>/dev/null || true
            else
              # Process ended or SSH failed — try to get exit code
              EXIT_CODE=$(ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
                "cat /tmp/build-exit 2>/dev/null || echo 255" 2>/dev/null) || {
                CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
                if [ $CONSECUTIVE_FAILURES -ge 6 ]; then
                  echo "::error::Lost connection to builder instance after 6 retries (possible spot interruption or OOM)"
                  exit 1
                fi
                echo "SSH failed (attempt $CONSECUTIVE_FAILURES/6), retrying in 30s..."
                continue
              }

              # Print final log output
              echo "=== Build finished (exit code: $EXIT_CODE) ==="
              ssh $SSH_OPTS -i /tmp/builder_key builder@"$BUILDER_IP" \
                "tail -100 /tmp/build.log" 2>/dev/null || true
              exit "${EXIT_CODE:-1}"
            fi
          done

      - name: Terminate builder instance
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            echo "Terminating instance $INSTANCE_ID..."
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" || true
            echo "Terminate request sent"
          fi
          rm -f /tmp/builder_key /tmp/user-data.sh

  # aarch64-linux + aarch64-darwin builds — run on EC2 Graviton spot instances
  build-arm64:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: eu-west-1
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            eval-cache = true
            extra-platforms = aarch64-linux
            extra-substituters = https://cache.nixcache.org
            extra-trusted-public-keys = nixcache.org-1:fd7sIL2BDxZa68s/IqZ8kvDsxsjt3SV4mQKdROuPoak=

      - name: Cache Nix evaluation
        uses: actions/cache@v5
        with:
          path: ~/.cache/nix
          key: nix-eval-arm64-${{ github.run_id }}
          restore-keys: |
            nix-eval-arm64-

      - name: Check if any arm64 build is needed
        id: dry-run
        run: |
          needs_build=false
          for cfg in dev-vm; do
            dry_output=$(nix build --dry-run ".#nixosConfigurations.${cfg}.config.system.build.toplevel" 2>&1)
            if echo "$dry_output" | grep -q 'will be built:'; then
              needs_build=true
              echo "$cfg needs building"
            fi
          done
          # Check darwin cross-compile
          dry_output=$(nix build --dry-run ".#darwinConfigurations.Alisons-MacBook-Pro.system" 2>&1) || true
          if echo "$dry_output" | grep -q 'will be built:'; then
            needs_build=true
            echo "Alisons-MacBook-Pro (darwin) needs building"
          fi
          echo "needs_build=$needs_build" >> "$GITHUB_OUTPUT"

      - name: Install AWS CLI
        if: steps.dry-run.outputs.needs_build == 'true'
        run: nix profile install nixpkgs#awscli2

      - name: Configure AWS credentials
        if: steps.dry-run.outputs.needs_build == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_BUILDER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest ARM builder AMI
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ami
        run: |
          AMI_ID=$(aws ec2 describe-images \
            --owners self \
            --filters \
              "Name=name,Values=nixos-aws-nix-builder-arm-*" \
              "Name=state,Values=available" \
            --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
            --output text)

          if [ "$AMI_ID" = "None" ] || [ -z "$AMI_ID" ]; then
            echo "::error::No ARM builder AMI found. Run the AMI build workflow first."
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Using ARM builder AMI: $AMI_ID"

      - name: Fetch SSH key from SSM
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ssh
        run: |
          aws ssm get-parameter \
            --name /nix-builder/ssh-private-key \
            --with-decryption \
            --query 'Parameter.Value' \
            --output text > /tmp/builder_key
          chmod 600 /tmp/builder_key
          PUBKEY=$(aws ssm get-parameter \
            --name /nix-builder/ssh-public-key \
            --query 'Parameter.Value' \
            --output text)
          echo "pubkey=$PUBKEY" >> "$GITHUB_OUTPUT"

      - name: Launch EC2 Graviton spot instance
        if: steps.dry-run.outputs.needs_build == 'true'
        id: ec2
        run: |
          cat > /tmp/user-data.sh <<'USERDATA'
          #!/bin/sh
          echo '${{ secrets.NIKS3_TOKEN }}' > /etc/niks3-token
          chown builder:users /etc/niks3-token
          chmod 600 /etc/niks3-token
          mkdir -p /home/builder/.ssh
          echo '${{ steps.ssh.outputs.pubkey }}' >> /home/builder/.ssh/authorized_keys
          chmod 700 /home/builder/.ssh
          chmod 600 /home/builder/.ssh/authorized_keys
          chown -R builder:users /home/builder/.ssh
          USERDATA

          USER_DATA_B64=$(base64 -w0 /tmp/user-data.sh)
          IFS=',' read -ra SUBNETS <<< "${{ secrets.AWS_BUILDER_SUBNET_IDS }}"

          # Create a new launch template version with user-data and AMI ID
          # AMI must be in the launch template (not overrides) so the launch
          # template's block device mappings (200GB) take precedence over the
          # AMI's default (auto-sized ~5GB).
          LT_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "${{ secrets.AWS_BUILDER_LT_ARM64_ID }}" \
            --source-version '$Default' \
            --launch-template-data "{\"UserData\": \"$USER_DATA_B64\", \"ImageId\": \"${{ steps.ami.outputs.ami_id }}\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)
          echo "Created launch template version: $LT_VERSION"

          # Build overrides: each instance type × each subnet
          OVERRIDES="[]"
          for itype in m7g.4xlarge m7g.2xlarge m6g.4xlarge m6g.2xlarge r7g.2xlarge c7g.4xlarge c7g.2xlarge c6g.4xlarge c6g.2xlarge; do
            for subnet in "${SUBNETS[@]}"; do
              OVERRIDES=$(echo "$OVERRIDES" | jq -c --arg it "$itype" --arg sn "$subnet" \
                '. + [{"InstanceType": $it, "SubnetId": $sn}]')
            done
          done

          jq -n \
            --arg lt "${{ secrets.AWS_BUILDER_LT_ARM64_ID }}" \
            --arg ltv "$LT_VERSION" \
            --arg sha "${{ github.sha }}" \
            --argjson overrides "$OVERRIDES" \
            '{
              Type: "instant",
              TargetCapacitySpecification: {TotalTargetCapacity: 1, DefaultTargetCapacityType: "spot"},
              SpotOptions: {AllocationStrategy: "price-capacity-optimized", InstanceInterruptionBehavior: "terminate"},
              LaunchTemplateConfigs: [{
                LaunchTemplateSpecification: {LaunchTemplateId: $lt, Version: $ltv},
                Overrides: $overrides
              }],
              TagSpecifications: [{
                ResourceType: "fleet",
                Tags: [{Key: "ManagedBy", Value: "gha-nix-builder"}, {Key: "GitCommit", Value: $sha}]
              }]
            }' > /tmp/fleet-config.json

          echo "Launching arm64 spot instance with price-capacity-optimized fleet..."
          FLEET_RESULT=$(aws ec2 create-fleet --cli-input-json file:///tmp/fleet-config.json --output json)
          echo "$FLEET_RESULT" | jq .

          INSTANCE_ID=$(echo "$FLEET_RESULT" | jq -r '.Instances[0].InstanceIds[0]')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "Fleet errors:"
            echo "$FLEET_RESULT" | jq '.Errors'
            echo "::error::Fleet failed to launch any Graviton instance"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Launched Graviton instance: $INSTANCE_ID"

          echo "Waiting for instance to be running..."
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"

          BUILDER_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "builder_ip=$BUILDER_IP" >> "$GITHUB_OUTPUT"
          echo "BUILDER_IP=$BUILDER_IP" >> "$GITHUB_ENV"
          echo "Instance IP: $BUILDER_IP"

      - name: Wait for SSH
        if: steps.dry-run.outputs.needs_build == 'true'
        env:
          SSH_OPTS: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes
        run: |
          echo "Waiting for SSH to become available..."
          for i in $(seq 1 60); do
            if ssh $SSH_OPTS -o ConnectTimeout=5 -o BatchMode=yes \
                   -i /tmp/builder_key builder@"$BUILDER_IP" true 2>/dev/null; then
              echo "SSH ready after ~$((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::SSH timeout after 5 minutes"
          exit 1

      - name: Build arm64 configs on EC2
        id: arm64-build
        if: steps.dry-run.outputs.needs_build == 'true'
        env:
          SSH_OPTS: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes
        run: |
          # Upload and start build in detached session so it survives SSH drops
          ssh $SSH_OPTS -i /tmp/builder_key builder@"$BUILDER_IP" bash <<'SETUP'
            cat > /tmp/build-arm64.sh <<'SCRIPT'
            #!/bin/bash
            set -uo pipefail

            # Add swap to prevent OOM killing sshd during heavy builds
            if [ ! -f /var/tmp/swapfile ]; then
              sudo fallocate -l 16G /var/tmp/swapfile
              sudo chmod 600 /var/tmp/swapfile
              sudo mkswap /var/tmp/swapfile
              sudo swapon /var/tmp/swapfile
              echo "Swap enabled: $(swapon --show)"
            fi

            NIKS3_TOKEN=$(cat /etc/niks3-token)
            QUEUE=/tmp/niks3-queue
            touch "$QUEUE"

            # Background drainer: watches queue and pushes paths as they appear
            (
              BATCH=0
              while true; do
                if [ -s "$QUEUE" ] && mv "$QUEUE" /tmp/niks3-processing 2>/dev/null; then
                  touch "$QUEUE"
                  PATHS=$(wc -l < /tmp/niks3-processing)
                  BATCH=$((BATCH + 1))
                  echo "[drainer] Batch $BATCH: pushing $PATHS path(s) to cache..."
                  if cat /tmp/niks3-processing | xargs -r niks3 push \
                    --server-url https://api.nixcache.org \
                    --max-concurrent-uploads 10 \
                    --auth-token "$NIKS3_TOKEN" 2>&1; then
                    echo "[drainer] Batch $BATCH: done"
                  else
                    echo "[drainer] Batch $BATCH: push failed (exit $?), will retry remaining paths later"
                  fi
                  rm -f /tmp/niks3-processing
                fi
                sleep 5
              done
            ) &
            DRAINER_PID=$!
            echo "$DRAINER_PID" > /tmp/drainer.pid

            sudo mkdir -p /var/tmp/nix-build
            sudo chown builder:users /var/tmp/nix-build
            export TMPDIR=/var/tmp/nix-build

            if [ -d ~/nix-config ]; then
              cd ~/nix-config
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/alisonjenkins/nix-config.git ~/nix-config
              cd ~/nix-config
            fi
            # git lfs pull || true # disabled: LFS budget exceeded, wallpapers relocated

            any_failed=false
            for cfg in dev-vm; do
              echo "=== Building $cfg ==="
              if nix build -L --keep-going --print-out-paths --no-link \
                ".#nixosConfigurations.${cfg}.config.system.build.toplevel" \
                2> >(tee -a /tmp/nix-build-stderr.log >&2) >> "$QUEUE"; then
                echo "=== $cfg complete ==="
              else
                echo "::warning::$cfg build failed"
                any_failed=true
              fi
            done

            echo "=== Cross-compiling Alisons-MacBook-Pro (aarch64-darwin) ==="
            if nix build -L --keep-going --print-out-paths --no-link \
              ".#darwinConfigurations.Alisons-MacBook-Pro.system" \
              2> >(tee -a /tmp/nix-build-stderr.log >&2) >> "$QUEUE"; then
              echo "=== Darwin cross-compile complete ==="
            else
              echo "::warning::Darwin cross-compile failed"
              any_failed=true
            fi

            # Stop drainer and do final push of any remaining paths
            kill $DRAINER_PID 2>/dev/null || true
            wait $DRAINER_PID 2>/dev/null || true

            cat "$QUEUE" /tmp/niks3-processing 2>/dev/null | sort -u > /tmp/niks3-final || true
            if [ -s /tmp/niks3-final ]; then
              FINAL_PATHS=$(wc -l < /tmp/niks3-final)
              echo "[final push] Pushing $FINAL_PATHS remaining path(s) to cache..."
              cat /tmp/niks3-final | xargs -r niks3 push \
                --server-url https://api.nixcache.org \
                --max-concurrent-uploads 10 \
                --auth-token "$NIKS3_TOKEN" 2>&1 || echo "[final push] Failed (exit $?)"
              echo "[final push] Done"
            else
              echo "[final push] No remaining paths to push"
            fi

            if [ "$any_failed" = true ]; then
              echo 1 > /tmp/build-exit
            else
              echo 0 > /tmp/build-exit
            fi
          SCRIPT
            chmod +x /tmp/build-arm64.sh
            nohup /tmp/build-arm64.sh > /tmp/build.log 2>&1 &
            echo $! > /tmp/build.pid
            echo "Build started with PID $(cat /tmp/build.pid)"
          SETUP

          # Poll for completion — survives temporary SSH drops
          echo "Build running in background on $BUILDER_IP, polling for completion..."
          CONSECUTIVE_FAILURES=0
          while true; do
            sleep 30
            if ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
              "kill -0 \$(cat /tmp/build.pid) 2>/dev/null" 2>/dev/null; then
              CONSECUTIVE_FAILURES=0
              ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
                "tail -5 /tmp/build.log" 2>/dev/null || true
            else
              EXIT_CODE=$(ssh $SSH_OPTS -o ConnectTimeout=10 -i /tmp/builder_key builder@"$BUILDER_IP" \
                "cat /tmp/build-exit 2>/dev/null || echo 255" 2>/dev/null) || {
                CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
                if [ $CONSECUTIVE_FAILURES -ge 6 ]; then
                  echo "::error::Lost connection to builder instance after 6 retries (possible spot interruption or OOM)"
                  exit 1
                fi
                echo "SSH failed (attempt $CONSECUTIVE_FAILURES/6), retrying in 30s..."
                continue
              }

              echo "=== Build finished (exit code: $EXIT_CODE) ==="
              ssh $SSH_OPTS -i /tmp/builder_key builder@"$BUILDER_IP" \
                "tail -100 /tmp/build.log" 2>/dev/null || true
              exit "${EXIT_CODE:-1}"
            fi
          done

      - name: Terminate builder instance
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            echo "Terminating instance $INSTANCE_ID..."
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID" || true
            echo "Terminate request sent"
          fi
          rm -f /tmp/builder_key /tmp/user-data.sh
