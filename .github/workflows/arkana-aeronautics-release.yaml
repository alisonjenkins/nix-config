# Build + publish Create: Arkana + Aeronautics modpack artifacts on tag push.
#
# Triggered by:
#   * pushing a tag matching `arkana-aeronautics-v*` (release semver tag)
#   * manual workflow_dispatch
#
# Outputs:
#   * Server OCI image at ghcr.io/<owner>/create-arkana-aeronautics-server
#     tagged with the git tag + `latest`
#   * Client zip attached to the GitHub release for that tag
#
# Auth notes:
#   * GITHUB_TOKEN gets `packages: write` for ghcr push (no PAT needed)
#   * GITHUB_TOKEN gets `contents: write` for release asset upload
#   * No OIDC / external secrets — entirely first-party
#
# Builder: x86_64-linux Ubuntu runner. The Nix derivation is platform-keyed
# to linux only (server tree + dockerTools.buildLayeredImage), so we don't
# attempt aarch64-darwin or aarch64-linux outputs from CI — the home Linux
# remote builder is for local devs, GHA runners build x86_64-linux directly.
#
# Multi-arch:
#   * GHA pushes only `:tag-amd64` + `:latest-amd64` (this workflow).
#   * The unsuffixed `:tag` and `:latest` tags are *manifest lists*
#     created locally by `just arkana-publish-arm64 <tag>` after the
#     aarch64-linux image is built on the maintainer's M-series Mac via
#     the linux remote builder. Cross-building dockerTools images for
#     aarch64 from x86_64 GHA runners is unreliable, so the per-arch
#     builds are split.

name: Arkana + Aeronautics — release

on:
  push:
    tags:
      - 'arkana-aeronautics-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)publish (e.g. arkana-aeronautics-v1.5-aero-1.2.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # release asset upload + tag read
  packages: write   # ghcr push
  id-token: write   # OIDC for any future signing/attestation

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/create-arkana-aeronautics-server
    steps:
      - name: Checkout (fetch the tagged commit)
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          # No LFS in this repo; skip the fetch.
          lfs: false

      - name: Reclaim runner disk for the 2.5 GB image build
        uses: wimpysworld/nothing-but-nix@main
        with:
          # Same shape as build-and-cache.yaml — keep cgroups so docker
          # works, drop everything else.
          hatchet-protocol: rampage

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            # Pull from the same caches the rest of this repo's CI uses
            # so flake-input + nixpkgs derivations are warm.
            extra-substituters = https://cache.nixcache.org https://nix-community.cachix.org https://cache.garnix.io
            extra-trusted-public-keys = nixcache.org-1:fd7sIL2BDxZa68s/IqZ8kvDsxsjt3SV4mQKdROuPoak= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Build server image + client zip in parallel
        id: build
        run: |
          set -euo pipefail
          # Single nix invocation building both targets — Nix's internal
          # scheduler parallelises derivations across them, sharing the
          # arkana-mods.nix fetchurl results between server and client
          # (otherwise both would refetch every CurseForge jar). max-jobs
          # tracks runner CPU count; cores=0 lets each derivation use all
          # available cores during its build phase.
          nix build --no-link --print-out-paths \
            --max-jobs auto --cores 0 \
            ".#packages.x86_64-linux.minecraft-arkana-aeronautics-image" \
            ".#packages.x86_64-linux.create-arkana-aeronautics-client" \
            > build-out.txt
          server_tar=$(sed -n '1p' build-out.txt)
          client_dir=$(sed -n '2p' build-out.txt)
          client_zip=$(ls "$client_dir"/*.zip)
          echo "image_tar=$server_tar" >> "$GITHUB_OUTPUT"
          echo "zip_path=$client_zip"  >> "$GITHUB_OUTPUT"
          ls -lh "$server_tar" "$client_zip"

      - name: Publish (push image + upload zip in parallel)
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          ZIP_PATH:  ${{ steps.build.outputs.zip_path }}
        run: |
          set -euo pipefail
          tag_ref="${TAG#arkana-aeronautics-}"   # strip the leading prefix

          # Pre-resolve nix shell paths so backgrounded subshells don't
          # race on the substitution lock. `nix build` is idempotent and
          # cheap if already in store.
          SKOPEO=$(nix build --no-link --print-out-paths nixpkgs#skopeo)/bin/skopeo
          GH=$(nix build --no-link --print-out-paths nixpkgs#gh)/bin/gh

          # skopeo's policy.json is missing on cold runners about ~10 % of
          # the time depending on which substitute path lands the binary.
          # `--insecure-policy` skips the trust-policy check (we don't
          # gate on signature trust here — GHCR push is authenticated by
          # the runner's GITHUB_TOKEN, not by image signature).
          echo "$GH_TOKEN" | "$SKOPEO" --insecure-policy login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

          # Image push (background) + release upload (background) — they
          # share zero state after auth, so `wait` joins both.
          (
            "$SKOPEO" --insecure-policy copy \
              "docker-archive:$IMAGE_TAR" \
              "docker://${IMAGE}:${tag_ref}-amd64"
            "$SKOPEO" --insecure-policy copy \
              "docker-archive:$IMAGE_TAR" \
              "docker://${IMAGE}:latest-amd64"
            echo "::notice::Pushed ${IMAGE}:${tag_ref}-amd64 and ${IMAGE}:latest-amd64"
            echo "::notice::Multi-arch :${tag_ref} + :latest pending arm64 push (run 'just arkana-publish-arm64 ${TAG}' locally)"
          ) &
          push_pid=$!

          (
            if ! "$GH" release view "$TAG" >/dev/null 2>&1; then
              "$GH" release create "$TAG" \
                --title "Create: Arkana + Aeronautics — $TAG" \
                --notes "Auto-generated by .github/workflows/arkana-aeronautics-release.yaml. Edit the release on GitHub for richer notes."
            fi
            "$GH" release upload "$TAG" "$ZIP_PATH" --clobber
            echo "::notice::Attached client zip to release $TAG"
          ) &
          upload_pid=$!

          wait "$push_pid"   || { echo "image push failed" >&2; exit 1; }
          wait "$upload_pid" || { echo "release upload failed" >&2; exit 1; }
