name: Build Installer ISO

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: >-
          Push closure to niks3 even when the dry-run says everything is
          cached. Use this to repopulate the remote cache after the
          self-hosted runner's persistent /nix/store has built paths that
          never made it to niks3.
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'flake-modules/hosts/installer-iso/**'
      - 'modules/base/**'
      - '.github/workflows/build-installer-iso.yaml'
      - '.github/scripts/install-niks3.sh'
      - '.github/scripts/niks3-background-push.sh'
      - '.github/actions/setup-host-nix/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-iso:
    runs-on: home-nix-builder-amd64
    timeout-minutes: 240
    permissions:
      contents: read
      actions: read
    env:
      # home-nix-builder-amd64 runs in home-cluster-1; niks3 lives in aws-k3s,
      # so the cluster-internal service DNS (niks3.niks3.svc.cluster.local) does
      # not resolve. Use the public ingress URL.
      NIKS3_SERVER_URL: https://api.nixcache.org
      # Distinct queue from build-and-cache so a concurrent run on the same
      # runner cannot interleave paths.
      NIKS3_QUEUE: /var/tmp/niks3-queue-installer-iso

    steps:
      - name: Skip if newer run is queued
        run: |
          NEWER=$(curl -sf -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=queued&branch=${{ github.ref_name }}&per_page=10" \
            | grep -o '"id":[0-9]*' | grep -o '[0-9]*' | awk '$1 > ${{ github.run_id }}' | wc -l)
          if [ "$NEWER" -gt 0 ]; then
            echo "::notice::Skipping this run — $NEWER newer run(s) queued"
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Configure host Nix
        uses: ./.github/actions/setup-host-nix

      - name: Check if ISO build is needed
        id: dry-run
        run: |
          if dry_output=$(nix build --dry-run \
              ".#nixosConfigurations.installer-iso.config.system.build.isoImage" 2>&1); then
            if echo "$dry_output" | grep -q 'will be built:'; then
              echo "needs_build=true" >> "$GITHUB_OUTPUT"
              echo "installer-iso needs building"
            else
              echo "needs_build=false" >> "$GITHUB_OUTPUT"
              echo "installer-iso is fully cached — skipping build (re-run with force_push to repopulate)"
            fi
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "installer-iso dry-run failed (needs building)"
            echo "$dry_output"
          fi

      - name: Install niks3
        if: steps.dry-run.outputs.needs_build == 'true' || inputs.force_push == true
        run: .github/scripts/install-niks3.sh

      - name: Build ISO and push closure to cache
        if: steps.dry-run.outputs.needs_build == 'true' || inputs.force_push == true
        env:
          NIKS3_TOKEN: ${{ secrets.NIKS3_TOKEN }}
        run: |
          source .github/scripts/niks3-background-push.sh
          niks3_start_drainer

          # `--print-out-paths` writes the iso store path (e.g. .../iso/...) to
          # the queue. The drainer expands the closure via
          # `nix path-info --recursive` before pushing; niks3 server-side dedup
          # skips paths already on the cache. When force_push is set, the
          # dry-run gate is bypassed but `nix build` is near-instant for paths
          # already in the local store — the value is in the resulting queue
          # entry, not in re-running the build.
          set +e
          nix build -L --keep-going --print-out-paths --no-link \
            ".#nixosConfigurations.installer-iso.config.system.build.isoImage" \
            2> >(tee /tmp/nix-build-stderr.log | grep --line-buffered -iE '(^[^ ]*> (building|configuring|installing|compiling|linking|cmake|make\[)|building .*/nix/store|copying path|fetching)' >&2) >> "$NIKS3_QUEUE"
          BUILD_EXIT=$?
          set -e

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::installer-iso build failed with exit code $BUILD_EXIT"
            echo "--- Full build stderr (last 100 lines) ---"
            tail -100 /tmp/nix-build-stderr.log
          fi

          niks3_stop_and_final_push

          exit $BUILD_EXIT

      - name: Stage ISO for artifact upload
        if: success() && (steps.dry-run.outputs.needs_build == 'true' || inputs.force_push == true)
        id: stage
        run: |
          iso_store=$(nix build --no-link --print-out-paths \
            ".#nixosConfigurations.installer-iso.config.system.build.isoImage")
          mkdir -p iso-out
          # Symlinks would be uploaded as resolved files by upload-artifact@v4
          # in `recommended` mode, but explicit copy keeps things obvious.
          cp -L "$iso_store"/iso/*.iso iso-out/
          ls -lh iso-out/
          iso_name=$(basename iso-out/*.iso)
          {
            echo "iso_name=$iso_name"
            echo "iso_sha256=$(sha256sum "iso-out/$iso_name" | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        if: success() && (steps.dry-run.outputs.needs_build == 'true' || inputs.force_push == true)
        uses: actions/upload-artifact@v7
        with:
          name: installer-iso-${{ github.run_id }}
          path: iso-out/*.iso
          retention-days: 14
          # ISOs are already compressed (squashfs+xz) — re-compressing wastes
          # CPU for ~0% gain.
          compression-level: 0

      - name: Job summary
        if: success()
        run: |
          {
            echo "## Installer ISO build"
            echo
            if [ "${{ steps.dry-run.outputs.needs_build }}" = "true" ] || [ "${{ inputs.force_push }}" = "true" ]; then
              echo "- Image: \`${{ steps.stage.outputs.iso_name }}\`"
              echo "- SHA256: \`${{ steps.stage.outputs.iso_sha256 }}\`"
              echo "- Closure pushed to: \`$NIKS3_SERVER_URL\`"
              echo
              echo "Download via the **Artifacts** section of this run."
            else
              echo "Fully cached — build + push skipped. Re-run with \`force_push\` to repopulate the cache."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
